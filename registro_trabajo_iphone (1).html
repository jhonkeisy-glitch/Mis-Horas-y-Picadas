<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mis Horas">
<meta name="theme-color" content="#0f1117">
<title>Mis Horas</title>
<style>
  :root {
    --bg:#0f1117;--card:#1a1d27;--card2:#21253a;--border:#2a2f45;
    --accent:#6c63ff;--accent2:#4ade80;--accent3:#f97316;--red:#f43f5e;
    --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;--radius:16px;
    --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;max-width:430px;margin:0 auto;}
  .safe-top{height:var(--safe-top);background:var(--card);flex-shrink:0;}

  /* HEADER */
  .header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px 12px;flex-shrink:0;}
  .header-top{display:flex;justify-content:space-between;align-items:center;}
  .header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
  .header h1 span{color:var(--accent);}
  .icon-btn{background:var(--card2);border:none;color:var(--muted2);width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .month-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .month-row button{background:var(--card2);border:none;color:var(--text);width:34px;height:34px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .month-row button:active{opacity:0.6;}
  .month-label-btn{flex:1;text-align:center;font-size:16px;font-weight:800;cursor:pointer;color:var(--text);background:none;border:none;font-family:-apple-system,sans-serif;}

  /* INICIO ROW */
  .inicio-row{background:var(--card2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .inicio-label{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;}
  .inicio-date-btn{background:var(--accent);color:white;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:-apple-system,sans-serif;flex:1;text-align:center;}
  .inicio-date-btn:active{opacity:0.8;}
  .inicio-info{font-size:11px;color:var(--muted);white-space:nowrap;}

  /* CONFIG */
  .config-bar{background:rgba(108,99,255,0.07);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
  .config-bar::-webkit-scrollbar{display:none;}
  .cfg-item{flex-shrink:0;}
  .cfg-item label{display:block;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
  .cfg-item input{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;font-weight:700;font-family:-apple-system,sans-serif;padding:5px 8px;border-radius:8px;width:88px;text-align:center;-webkit-appearance:none;}

  /* SCROLL */
  .scroll-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + var(--safe-bottom));}

  /* RESUMEN */
  .resumen{padding:14px 16px 0;}
  .resumen-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .r-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px;}
  .r-card.full{grid-column:1/-1;background:linear-gradient(135deg,#1e1b4b 0%,#1a1d27 100%);border-color:rgba(108,99,255,0.5);}
  .r-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:4px;}
  .r-val{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
  .r-sub{font-size:11px;color:var(--muted2);margin-top:3px;line-height:1.4;}
  .c-green{color:var(--accent2);}.c-purple{color:var(--accent);}.c-orange{color:var(--accent3);}.c-red{color:var(--red);}

  /* SECTION */
  .section{padding:14px 16px 0;}
  .sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .btn-hoy{background:var(--accent);color:white;border:none;border-radius:10px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif;}

  /* DAY CARDS */
  .day-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
  .day-header{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none;-webkit-user-select:none;}
  .day-header:active{background:rgba(255,255,255,0.03);}
  .day-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;}
  .day-dot.has-data{background:var(--accent2);}
  .day-dot.has-horas{background:var(--accent);box-shadow:0 0 6px var(--accent);}
  .day-info{flex:1;min-width:0;}
  .day-name{font-size:14px;font-weight:700;}
  .day-date{font-size:11px;color:var(--muted);margin-top:1px;}
  .day-tags{display:flex;gap:6px;flex-wrap:wrap;}
  .tag{border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;background:var(--card2);}
  .tag.or{color:var(--accent3);}.tag.pu{color:var(--accent);}
  .chevron{color:var(--muted);font-size:11px;transition:transform 0.2s;flex-shrink:0;}
  .chevron.open{transform:rotate(180deg);}
  .day-form{border-top:1px solid var(--border);padding:14px;display:none;}
  .day-form.open{display:block;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .ff label{display:block;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .ff input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;font-weight:600;font-family:-apple-system,sans-serif;padding:10px 12px;outline:none;-webkit-appearance:none;transition:border-color 0.2s;}
  .ff input:focus{border-color:var(--accent);}
  .btn-guardar{width:100%;margin-top:12px;background:var(--accent);color:white;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif;}
  .btn-guardar:active{opacity:0.8;}
  .btn-borrar{width:100%;margin-top:8px;background:transparent;color:var(--red);border:1.5px solid rgba(244,63,94,0.3);border-radius:14px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif;}

  /* DIAS ADJUSTER */
  .dias-adjuster{margin:16px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .dias-adjuster-info .title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:2px;}
  .dias-adjuster-info .val{font-size:22px;font-weight:800;}
  .dias-adjuster-info .val span{font-size:13px;font-weight:500;color:var(--muted2);margin-left:4px;}
  .dias-btns-row{display:flex;gap:8px;}
  .dias-btn{width:44px;height:44px;border-radius:12px;border:none;cursor:pointer;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-family:-apple-system,sans-serif;}
  .dias-btn.minus{background:rgba(244,63,94,0.12);color:var(--red);}
  .dias-btn.plus{background:rgba(108,99,255,0.15);color:var(--accent);}
  .dias-btn:active{opacity:0.6;transform:scale(0.93);}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:var(--safe-bottom);}
  .nav-btn{flex:1;padding:10px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-family:-apple-system,sans-serif;font-size:10px;font-weight:600;cursor:pointer;}
  .nav-btn.active{color:var(--accent);}
  .nav-btn svg{width:24px;height:24px;}

  /* VIEWS */
  .view{display:none;}.view.active{display:block;}

  /* HISTORIAL */
  .hist-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
  .hist-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .hist-head h3{font-size:15px;font-weight:800;}
  .hist-neto{color:var(--accent2);font-weight:800;font-size:15px;}
  .hist-body{border-top:1px solid var(--border);padding:4px 16px 14px;display:none;}
  .hist-body.open{display:block;}
  .hrow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;}
  .hrow:last-child{border-bottom:none;}
  .hrow .hl{color:var(--accent2);font-weight:800;}

  /* SHEET */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;display:none;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
  .sheet-bg.open{display:flex;}
  .sheet{background:var(--card);border-radius:24px 24px 0 0;padding:20px 20px calc(20px + var(--safe-bottom));width:100%;max-width:430px;animation:slideUp 0.3s cubic-bezier(.32,.72,0,1);}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
  .sheet h3{font-size:17px;font-weight:800;margin-bottom:6px;}
  .sheet p{font-size:12px;color:var(--muted2);margin-bottom:16px;}
  .date-input-big{width:100%;background:var(--bg);border:2px solid var(--accent);border-radius:14px;color:var(--text);font-size:20px;font-weight:700;font-family:-apple-system,sans-serif;padding:14px 16px;outline:none;-webkit-appearance:none;margin-bottom:14px;}
  .btn-confirmar{width:100%;background:var(--accent);color:white;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif;}
  .btn-confirmar:active{opacity:0.8;}
  .empty{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty .ico{font-size:48px;margin-bottom:14px;}
  .ff textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:-apple-system,sans-serif;padding:10px 12px;outline:none;-webkit-appearance:none;transition:border-color 0.2s;resize:none;min-height:70px;line-height:1.5;}
  .ff textarea:focus{border-color:var(--accent);}
  .nota-preview{font-size:11px;color:var(--muted2);max-width:120px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-style:italic;}
  .btn-nota{display:flex;align-items:center;gap:6px;width:100%;margin-top:10px;background:var(--card2);color:var(--muted2);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif;transition:all 0.2s;}
  .btn-nota:active{opacity:0.7;}
  .btn-nota.has-nota{color:var(--accent2);border-color:rgba(74,222,128,0.4);background:rgba(74,222,128,0.06);}
  /* NOTA MODAL */
  .nota-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:400;display:none;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}
  .nota-modal-bg.open{display:flex;}
  .nota-modal{background:var(--card);border-radius:24px 24px 0 0;padding:20px 20px calc(24px + var(--safe-bottom));width:100%;max-width:430px;animation:slideUp 0.3s cubic-bezier(.32,.72,0,1);}
  .nota-modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
  .nota-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .nota-modal-header h3{font-size:17px;font-weight:800;}
  .nota-modal-header .nota-fecha{font-size:12px;color:var(--muted2);}
  .nota-textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-size:15px;font-family:-apple-system,sans-serif;padding:14px;outline:none;-webkit-appearance:none;resize:none;min-height:140px;line-height:1.6;margin-bottom:12px;}
  .nota-textarea:focus{border-color:var(--accent);}
  .nota-modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .btn-nota-cancel{background:var(--card2);color:var(--muted2);border:1px solid var(--border);border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif;}
  .btn-nota-save{background:var(--accent);color:white;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif;}
  .btn-nota-save:active{opacity:0.8;}
</style>
</head>
<body>
<div class="safe-top"></div>

<div class="header">
  <div class="header-top">
    <h1>Mis <span>Horas</span></h1>
    <button class="icon-btn" onclick="mostrarVista('historial')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </button>
  </div>
  <div class="month-row">
    <button onclick="cambiarMes(-1)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="month-label-btn" id="lbl-mes">—</button>
    <button onclick="cambiarMes(1)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<div class="inicio-row">
  <div class="inicio-label">Inicio:</div>
  <button class="inicio-date-btn" id="btn-inicio" onclick="abrirSheet()">Toca para configurar</button>
  <div class="inicio-info" id="info-dias"></div>
</div>

<div class="config-bar">
  <div class="cfg-item"><label>€/Picada</label><input type="number" id="cfg-picada" step="0.001" value="0.05" oninput="guardarConfig();renderResumen(getDatos())"></div>
  <div class="cfg-item"><label>Base (€)</label><input type="number" id="cfg-base" step="10" value="1780" oninput="guardarConfig();renderResumen(getDatos())"></div>
  <div class="cfg-item"><label>€/Hora Extra</label><input type="number" id="cfg-extra" step="0.5" value="10" oninput="guardarConfig();renderResumen(getDatos())"></div>
  <div class="cfg-item"><label>RDE %</label><input type="number" id="cfg-rde" step="0.1" value="20.5" oninput="guardarConfig();renderResumen(getDatos())"></div>
  <div class="cfg-item"><label>Seg. Social %</label><input type="number" id="cfg-segsocial" step="0.1" value="6.35" oninput="guardarConfig();renderResumen(getDatos())"></div>
</div>

<div class="scroll-content">
  <div id="view-registro" class="view active">
    <div class="resumen"><div class="resumen-grid" id="resumen-grid"></div></div>
    <div class="section">
      <div class="sec-title">Días del período <button class="btn-hoy" onclick="irAHoy()">+ Hoy</button></div>
      <div id="lista-dias"></div>
    </div>
    <div class="dias-adjuster">
      <div class="dias-adjuster-info">
        <div class="title">Días del período</div>
        <div class="val" id="lbl-dias">30 <span>días</span></div>
      </div>
      <div class="dias-btns-row">
        <button class="dias-btn minus" onclick="ajustarDias(-1)">−</button>
        <button class="dias-btn plus"  onclick="ajustarDias(1)">+</button>
      </div>
    </div>
    <div style="height:16px"></div>
  </div>

  <div id="view-historial" class="view">
    <div class="section" style="padding-top:18px">
      <div class="sec-title">Historial <button class="btn-hoy" style="background:var(--card2);color:var(--text);border:1px solid var(--border)" onclick="mostrarVista('registro')">← Volver</button></div>
      <div id="lista-historial"></div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-registro" onclick="mostrarVista('registro')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Registro
  </button>
  <button class="nav-btn" id="nav-historial" onclick="mostrarVista('historial')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Historial
  </button>
</nav>

<!-- SHEET FECHA INICIO -->
<div class="sheet-bg" id="sheet-bg" onclick="cerrarSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>¿Cuándo empieza este período?</h3>
    <p>Selecciona el primer día. Los 30 días siguientes aparecen solos.</p>
    <input type="date" id="input-fecha" class="date-input-big">
    <button class="btn-confirmar" onclick="confirmarFecha()">Confirmar</button>
  </div>
</div>

<!-- NOTA MODAL -->
<div class="nota-modal-bg" id="nota-modal-bg" onclick="cerrarNotaModal(event)">
  <div class="nota-modal">
    <div class="nota-modal-handle"></div>
    <div class="nota-modal-header">
      <h3>📝 Nota</h3>
      <span class="nota-fecha" id="nota-modal-fecha"></span>
    </div>
    <textarea class="nota-textarea" id="nota-modal-text" placeholder="Escribe lo que necesites recordar de este día..."></textarea>
    <div class="nota-modal-btns">
      <button class="btn-nota-cancel" onclick="cerrarNotaModal()">Cancelar</button>
      <button class="btn-nota-save" onclick="guardarNota()">Guardar nota</button>
    </div>
  </div>
</div>

<script>
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

// mesActual = "2026-06"
let mesActual = '';

// ─── KEYS POR MES ───
const kDatos  = () => 'th_datos_'  + mesActual;
const kInicio = () => 'th_inicio_' + mesActual;
const kDias   = () => 'th_dias_'   + mesActual;

// ─── DATOS ───
function getDatos()    { return JSON.parse(localStorage.getItem(kDatos())  || '[]'); }
function setDatos(d)   { localStorage.setItem(kDatos(), JSON.stringify(d)); }

// ─── FECHA INICIO DEL MES ───
function getFechaInicio() {
  const s = localStorage.getItem(kInicio());
  if (s) return new Date(s + 'T00:00:00');
  // Por defecto: día 1 del mes seleccionado
  const [y, m] = mesActual.split('-').map(Number);
  return new Date(y, m - 1, 1);
}
function setFechaInicio(f) { localStorage.setItem(kInicio(), fmtDate(f)); }

// ─── DÍAS DEL PERÍODO ───
function getDias() { return parseInt(localStorage.getItem(kDias()) || '30'); }
function setDias(n) { localStorage.setItem(kDias(), n); }

// ─── TODAS LAS FECHAS DEL PERÍODO ───
function getFechas() {
  const inicio = getFechaInicio();
  const dias   = getDias();
  const arr = [];
  for (let i = 0; i < dias; i++) {
    const f = new Date(inicio);
    f.setDate(f.getDate() + i);
    arr.push(f);
  }
  return arr;
}

// ─── CONFIG ───
function getConfig() {
  return {
    picada:    parseFloat(document.getElementById('cfg-picada').value)    || 0.05,
    base:      parseFloat(document.getElementById('cfg-base').value)      || 1780,
    extra:     parseFloat(document.getElementById('cfg-extra').value)     || 10,
    rde:       parseFloat(document.getElementById('cfg-rde').value)       || 20.5,
    segsocial: parseFloat(document.getElementById('cfg-segsocial').value) || 6.35,
  };
}
function guardarConfig() { localStorage.setItem('th_config', JSON.stringify(getConfig())); }
function cargarConfig() {
  const c = JSON.parse(localStorage.getItem('th_config') || 'null');
  if (!c) return;
  if (c.picada    != null) document.getElementById('cfg-picada').value    = c.picada;
  if (c.base      != null) document.getElementById('cfg-base').value      = c.base;
  if (c.extra     != null) document.getElementById('cfg-extra').value     = c.extra;
  if (c.rde       != null) document.getElementById('cfg-rde').value       = c.rde;
  if (c.segsocial != null) document.getElementById('cfg-segsocial').value = c.segsocial;
}

// ─── HELPERS ───
function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDisplay(d) {
  return d.getDate() + ' ' + MESES[d.getMonth()].slice(0,3) + ' ' + d.getFullYear();
}
function fmt(n) { return '€' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
function parsear(v) { return parseFloat(String(v).replace(',','.')) || 0; }

// ─── LABEL ───
function actualizarLabel() {
  const [y, m] = mesActual.split('-').map(Number);
  document.getElementById('lbl-mes').textContent = MESES[m-1] + ' ' + y;

  const fechas = getFechas();
  const ini    = fechas[0];
  const fin    = fechas[fechas.length - 1];
  document.getElementById('btn-inicio').textContent = fmtDisplay(ini) + ' → ' + fmtDisplay(fin);
  document.getElementById('info-dias').textContent  = getDias() + ' días';

  const lbl = document.getElementById('lbl-dias');
  if (lbl) lbl.innerHTML = getDias() + ' <span>días</span>';
}

// ─── NAVEGACIÓN ───
function cambiarMes(d) {
  const [y, m] = mesActual.split('-').map(Number);
  const f = new Date(y, m - 1 + d, 1);
  mesActual = f.getFullYear() + '-' + String(f.getMonth()+1).padStart(2,'0');
  actualizarLabel();
  renderAll();
}

function mostrarVista(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('nav-'  + v).classList.add('active');
  if (v === 'historial') renderHistorial();
}

// ─── SHEET ───
function abrirSheet() {
  document.getElementById('input-fecha').value = fmtDate(getFechaInicio());
  document.getElementById('sheet-bg').classList.add('open');
}
function cerrarSheet(e) {
  if (e.target === document.getElementById('sheet-bg'))
    document.getElementById('sheet-bg').classList.remove('open');
}
function confirmarFecha() {
  const val = document.getElementById('input-fecha').value;
  if (!val) return;
  setFechaInicio(new Date(val + 'T00:00:00'));
  document.getElementById('sheet-bg').classList.remove('open');
  actualizarLabel();
  renderAll();
}

// ─── AJUSTAR DÍAS ───
function ajustarDias(delta) {
  const nuevo = Math.max(28, Math.min(60, getDias() + delta));
  setDias(nuevo);
  actualizarLabel();
  renderAll();
}

// ─── CALCULAR ───
function calcular(datos) {
  const c = getConfig();
  let totalPicadas = 0, totalHoras = 0;
  datos.forEach(d => { totalPicadas += parsear(d.picadas); totalHoras += parsear(d.horas); });
  const totalPicada  = totalPicadas * c.picada;
  const totalExtras  = totalHoras   * c.extra;
  const totalTonto   = totalPicada  + c.base + totalExtras;
  const rde          = totalTonto * (c.rde       / 100);
  const segSocial    = totalTonto * (c.segsocial / 100);
  const deducciones  = rde + segSocial;
  const neto         = totalTonto - deducciones;
  return { totalPicadas, totalHoras, totalPicada, totalExtras, totalTonto, rde, segSocial, deducciones, neto };
}

// ─── RENDER RESUMEN ───
function renderResumen(datos) {
  const r = calcular(datos);
  const c = getConfig();
  document.getElementById('resumen-grid').innerHTML =
    '<div class="r-card"><div class="r-label">Picadas</div><div class="r-val c-orange">' + r.totalPicadas.toLocaleString('es') + '</div><div class="r-sub">' + fmt(r.totalPicada) + '</div></div>' +
    '<div class="r-card"><div class="r-label">Horas Extra</div><div class="r-val c-purple">' + r.totalHoras.toFixed(1) + ' h</div><div class="r-sub">' + fmt(r.totalExtras) + '</div></div>' +
    '<div class="r-card"><div class="r-label">Bruto</div><div class="r-val" style="font-size:18px">' + fmt(r.totalTonto) + '</div><div class="r-sub">Deduc: <span class="c-red">' + fmt(r.deducciones) + '</span></div></div>' +
    '<div class="r-card"><div class="r-label">Días trabajados</div><div class="r-val" style="font-size:26px">' + datos.filter(d => parsear(d.picadas) > 0 || parsear(d.horas) > 0).length + '</div><div class="r-sub">de ' + getDias() + ' días</div></div>' +
    '<div class="r-card full"><div class="r-label">💰 Neto a Cobrar</div><div class="r-val c-green" style="font-size:32px;letter-spacing:-1px">' + fmt(r.neto) + '</div><div class="r-sub">RDE ' + c.rde + '%: ' + fmt(r.rde) + ' · Seg.Social ' + c.segsocial + '%: ' + fmt(r.segSocial) + '</div></div>';
}

// ─── RENDER DÍAS ───
function renderDias(datos) {
  const cont   = document.getElementById('lista-dias');
  cont.innerHTML = '';
  const fechas = getFechas();
  const hoy    = new Date(); hoy.setHours(0,0,0,0);

  fechas.forEach((fecha, idx) => {
    const entrada   = datos.find(x => x.idx === idx) || null;
    const pic       = entrada ? parsear(entrada.picadas) : 0;
    const hex       = entrada ? parsear(entrada.horas)   : 0;
    const nota      = entrada && entrada.nota ? entrada.nota : '';
    const tieneAlgo = pic > 0 || hex > 0 || nota;
    const dotCls    = hex > 0 ? 'has-horas' : (pic > 0 || nota) ? 'has-data' : '';
    const esHoy     = fecha.getTime() === hoy.getTime();

    // Card
    const card = document.createElement('div');
    card.className = 'day-card'; card.id = 'card-' + idx;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'day-header';
    hdr.innerHTML =
      '<div class="day-dot ' + dotCls + '"></div>' +
      '<div class="day-info">' +
        '<div class="day-name">' + DIAS[fecha.getDay()] + (esHoy ? ' <span style="color:var(--accent);font-size:11px">· Hoy</span>' : '') + '</div>' +
        '<div class="day-date">' + fecha.getDate() + ' de ' + MESES[fecha.getMonth()] + ' ' + fecha.getFullYear() + '</div>' +
      '</div>' +
      '<div class="day-tags">' +
        (pic > 0 ? '<span class="tag or">' + pic.toLocaleString('es') + ' pic.</span>' : '') +
        (hex > 0 ? '<span class="tag pu">' + hex + 'h</span>' : '') +
        (entrada && entrada.nota ? '<span class="nota-preview">📝 ' + entrada.nota + '</span>' : '') +
      '</div>' +
      '<span class="chevron" id="chev-' + idx + '">▼</span>';
    hdr.addEventListener('click', () => toggleDia(idx));

    // Formulario
    const form = document.createElement('div');
    form.className = 'day-form'; form.id = 'form-' + idx;
    const grid = document.createElement('div');
    grid.className = 'form-grid';

    function mkInput(labelTxt, tipo, inputId, valor, modo, paso) {
      const ff = document.createElement('div'); ff.className = 'ff';
      ff.innerHTML = '<label>' + labelTxt + '</label>';
      const inp = document.createElement('input');
      inp.type = tipo; inp.id = inputId; inp.value = valor || '';
      if (modo) inp.inputMode = modo;
      if (paso) inp.step = paso;
      if (tipo === 'number') inp.min = '0';
      inp.placeholder = tipo === 'time' ? '--:--' : '0';
      ff.appendChild(inp);
      return { ff, inp };
    }

    // Variable nota en memoria para este día
    let notaActual = entrada && entrada.nota ? entrada.nota : '';

    const { ff: ffHin,  inp: inHin  } = mkInput('Hora entrada', 'time',   'hin-'  + idx, entrada?.horaEntrada);
    const { ff: ffHout, inp: inHout  } = mkInput('Hora salida',  'time',   'hout-' + idx, entrada?.horaSalida);
    const { ff: ffPic,  inp: inPic   } = mkInput('Picadas',      'number', 'pic-'  + idx, pic > 0 ? pic : '', 'numeric');
    const { ff: ffHex,  inp: inHex   } = mkInput('Horas extra',  'number', 'hex-'  + idx, hex > 0 ? hex : '', 'decimal', '0.5');

    // Auto-calcular horas al poner entrada/salida
    function autoCalc() {
      const v1 = inHin.value, v2 = inHout.value;
      if (!v1 || !v2) return;
      const [h1,m1] = v1.split(':').map(Number);
      const [h2,m2] = v2.split(':').map(Number);
      let min = (h2*60+m2) - (h1*60+m1);
      if (min < 0) min += 1440;
      inHex.value = Math.round((min/60)*100)/100;
      inHex.style.borderColor = 'var(--accent2)';
      setTimeout(() => inHex.style.borderColor = '', 1500);
    }
    inHin.addEventListener('change', autoCalc);
    inHout.addEventListener('change', autoCalc);

    grid.appendChild(ffHin); grid.appendChild(ffHout);
    grid.appendChild(ffPic); grid.appendChild(ffHex);
    form.appendChild(grid);

    // Botón nota
    const btnNota = document.createElement('button');
    btnNota.className = 'btn-nota' + (notaActual ? ' has-nota' : '');
    btnNota.innerHTML = (notaActual ? '📝' : '🖊️') + ' <span>' + (notaActual ? 'Ver / editar nota' : 'Añadir nota del día') + '</span>';
    btnNota.addEventListener('click', () => abrirNotaModal(idx, DIAS[fecha.getDay()] + ', ' + fecha.getDate() + ' de ' + MESES[fecha.getMonth()]));
    form.appendChild(btnNota);

    const btnG = document.createElement('button');
    btnG.className = 'btn-guardar'; btnG.textContent = 'Guardar';
    btnG.addEventListener('click', () => {
      let datos = getDatos();
      const p = parsear(inPic.value);
      const h = parsear(inHex.value);
      const nota = notaActual;
      datos = datos.filter(x => x.idx !== idx);
      if (p > 0 || h > 0 || inHin.value || inHout.value || nota)
        datos.push({ idx, picadas:p, horas:h, horaEntrada:inHin.value, horaSalida:inHout.value, nota });
      setDatos(datos);
      toggleDia(idx);
      renderAll();
    });
    form.appendChild(btnG);

    if (tieneAlgo) {
      const btnB = document.createElement('button');
      btnB.className = 'btn-borrar'; btnB.textContent = 'Borrar este día';
      btnB.addEventListener('click', () => {
        if (!confirm('¿Borrar los datos de este día?')) return;
        setDatos(getDatos().filter(x => x.idx !== idx));
        renderAll();
      });
      form.appendChild(btnB);
    }

    card.appendChild(hdr); card.appendChild(form);
    cont.appendChild(card);
  });
}

function toggleDia(idx) {
  const form = document.getElementById('form-' + idx);
  const chev = document.getElementById('chev-' + idx);
  const open = form.classList.contains('open');
  document.querySelectorAll('.day-form.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.chevron.open').forEach(el => el.classList.remove('open'));
  if (!open) { form.classList.add('open'); if (chev) chev.classList.add('open'); }
}

function renderAll() {
  const datos = getDatos();
  renderResumen(datos);
  renderDias(datos);
  actualizarLabel();
}

function irAHoy() {
  const hoy = new Date();
  const mk  = hoy.getFullYear() + '-' + String(hoy.getMonth()+1).padStart(2,'0');
  if (mk !== mesActual) { mesActual = mk; }
  const hoyMs  = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate()).getTime();
  renderAll();
  const fechas = getFechas();
  const idx    = fechas.findIndex(f => f.getTime() === hoyMs);
  if (idx >= 0) {
    setTimeout(() => {
      const card = document.getElementById('card-' + idx);
      if (card) { card.scrollIntoView({ behavior:'smooth', block:'center' }); setTimeout(() => toggleDia(idx), 350); }
    }, 100);
  }
}

// ─── HISTORIAL ───
function renderHistorial() {
  const cont = document.getElementById('lista-historial');
  const meses = [];
  for (let key in localStorage) {
    if (key.startsWith('th_datos_')) meses.push(key.replace('th_datos_',''));
  }
  meses.sort((a,b) => b.localeCompare(a));
  if (!meses.length) { cont.innerHTML = '<div class="empty"><div class="ico">📊</div><p>Sin datos aún</p></div>'; return; }
  const c = getConfig();
  let html = '';
  meses.forEach(mk => {
    const datos = JSON.parse(localStorage.getItem('th_datos_' + mk) || '[]');
    if (!datos.length) return;
    const r = calcular(datos);
    const [y, m] = mk.split('-').map(Number);
    html +=
      '<div class="hist-card">' +
        '<div class="hist-head" onclick="this.nextElementSibling.classList.toggle(\'open\')">' +
          '<h3>' + MESES[m-1] + ' ' + y + '</h3>' +
          '<span class="hist-neto">' + fmt(r.neto) + '</span>' +
        '</div>' +
        '<div class="hist-body">' +
          '<div class="hrow"><span>Picadas</span><span>' + r.totalPicadas.toLocaleString('es') + ' → ' + fmt(r.totalPicada) + '</span></div>' +
          '<div class="hrow"><span>Horas extra</span><span>' + r.totalHoras.toFixed(1) + 'h → ' + fmt(r.totalExtras) + '</span></div>' +
          '<div class="hrow"><span>Sueldo base</span><span>' + fmt(c.base) + '</span></div>' +
          '<div class="hrow"><span>Bruto</span><span>' + fmt(r.totalTonto) + '</span></div>' +
          '<div class="hrow"><span>RDE (' + c.rde + '%)</span><span class="c-red">-' + fmt(r.rde) + '</span></div>' +
          '<div class="hrow"><span>Seg. Social (' + c.segsocial + '%)</span><span class="c-red">-' + fmt(r.segSocial) + '</span></div>' +
          '<div class="hrow"><span class="bold">Neto a cobrar</span><span class="hl">' + fmt(r.neto) + '</span></div>' +
        '</div>' +
      '</div>';
  });
  cont.innerHTML = html || '<div class="empty"><div class="ico">📊</div><p>Sin datos aún</p></div>';
}

// ─── NOTA MODAL ───
let notaModalIdx = null;

function abrirNotaModal(idx, fechaLabel) {
  notaModalIdx = idx;
  document.getElementById('nota-modal-fecha').textContent = fechaLabel;
  const datos   = getDatos();
  const entrada = datos.find(x => x.idx === idx) || null;
  document.getElementById('nota-modal-text').value = entrada && entrada.nota ? entrada.nota : '';
  document.getElementById('nota-modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('nota-modal-text').focus(), 300);
}

function cerrarNotaModal(e) {
  if (!e || e.target === document.getElementById('nota-modal-bg'))
    document.getElementById('nota-modal-bg').classList.remove('open');
}

function guardarNota() {
  const nota  = document.getElementById('nota-modal-text').value.trim();
  let datos   = getDatos();
  const idx   = notaModalIdx;
  const exist = datos.find(x => x.idx === idx);
  if (exist) {
    exist.nota = nota;
  } else if (nota) {
    datos.push({ idx, picadas:0, horas:0, horaEntrada:'', horaSalida:'', nota });
  }
  // Remove if completely empty
  datos = datos.filter(x => x.picadas > 0 || x.horas > 0 || x.horaEntrada || x.nota);
  setDatos(datos);
  document.getElementById('nota-modal-bg').classList.remove('open');
  renderAll();
}

// ─── INIT ───
cargarConfig();
const hoyInit = new Date();
mesActual = hoyInit.getFullYear() + '-' + String(hoyInit.getMonth()+1).padStart(2,'0');
actualizarLabel();
renderAll();
</script>
</body>
