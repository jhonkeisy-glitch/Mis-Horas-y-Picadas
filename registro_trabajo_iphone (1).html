<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mis Horas">
<meta name="theme-color" content="#0f1117">
<title>Mis Horas</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card2: #21253a; --border: #2a2f45;
    --accent: #6c63ff; --accent2: #4ade80; --accent3: #f97316; --red: #f43f5e;
    --text: #e2e8f0; --muted: #64748b; --muted2: #94a3b8; --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }

  .status-bar-space { height: var(--safe-top); background: var(--card); flex-shrink: 0; }

  /* HEADER */
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 20px 12px; flex-shrink: 0; }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .icon-btn { background: var(--card2); border: none; color: var(--muted2); width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .month-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .month-row button { background: var(--card2); border: none; color: var(--text); width: 34px; height: 34px; border-radius: 10px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .month-row button:active { opacity: 0.6; }
  .month-label-btn { flex: 1; text-align: center; font-size: 15px; font-weight: 800; cursor: pointer; color: var(--text); background: none; border: none; font-family: -apple-system,sans-serif; }

  /* INICIO ROW */
  .inicio-row { background: var(--card2); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }
  .inicio-label { font-size: 11px; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .inicio-date-btn { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 7px 14px; font-size: 13px; font-weight: 800; cursor: pointer; font-family: -apple-system,sans-serif; letter-spacing: -0.3px; }
  .inicio-date-btn:active { opacity: 0.8; }
  .inicio-info { font-size: 11px; color: var(--muted); margin-left: auto; }

  /* CONFIG BAR */
  .config-bar { background: rgba(108,99,255,0.07); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; gap: 14px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
  .config-bar::-webkit-scrollbar { display: none; }
  .cfg-item { flex-shrink: 0; }
  .cfg-item label { display: block; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .cfg-item input { background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 14px; font-weight: 700; font-family: -apple-system,sans-serif; padding: 5px 8px; border-radius: 8px; width: 88px; text-align: center; -webkit-appearance: none; }

  /* SCROLL */
  .scroll-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(80px + var(--safe-bottom)); }

  /* RESUMEN */
  .resumen { padding: 14px 16px 0; }
  .resumen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .r-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; }
  .r-card.full { grid-column: 1 / -1; background: linear-gradient(135deg, #1e1b4b 0%, #1a1d27 100%); border-color: rgba(108,99,255,0.5); }
  .r-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
  .r-val { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .r-sub { font-size: 11px; color: var(--muted2); margin-top: 3px; line-height: 1.4; }
  .c-green { color: var(--accent2); } .c-purple { color: var(--accent); } .c-orange { color: var(--accent3); } .c-red { color: var(--red); }

  /* SECTION */
  .section { padding: 14px 16px 0; }
  .sec-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .btn-hoy { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 5px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: -apple-system,sans-serif; }
  .btn-hoy:active { opacity: 0.75; }

  /* DAY CARDS */
  .day-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
  .day-header { display: flex; align-items: center; gap: 10px; padding: 13px 14px; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .day-header:active { background: rgba(255,255,255,0.03); }
  .day-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .day-dot.has-data { background: var(--accent2); }
  .day-dot.has-horas { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .day-info { flex: 1; min-width: 0; }
  .day-name { font-size: 14px; font-weight: 700; }
  .day-date { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .day-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; background: var(--card2); }
  .tag.or { color: var(--accent3); } .tag.pu { color: var(--accent); }
  .chevron { color: var(--muted); font-size: 11px; transition: transform 0.2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }
  .day-form { border-top: 1px solid var(--border); padding: 14px; display: none; }
  .day-form.open { display: block; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ff label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .ff input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-size: 16px; font-weight: 600; font-family: -apple-system,sans-serif; padding: 10px 12px; outline: none; -webkit-appearance: none; transition: border-color 0.2s; }
  .ff input:focus { border-color: var(--accent); }
  .btn-guardar { width: 100%; margin-top: 12px; background: var(--accent); color: white; border: none; border-radius: 14px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: -apple-system,sans-serif; }
  .btn-guardar:active { opacity: 0.8; }
  .btn-borrar { width: 100%; margin-top: 8px; background: transparent; color: var(--red); border: 1.5px solid rgba(244,63,94,0.3); border-radius: 14px; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: -apple-system,sans-serif; }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 200; padding-bottom: var(--safe-bottom); }
  .nav-btn { flex: 1; padding: 10px 8px 12px; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; color: var(--muted); font-family: -apple-system,sans-serif; font-size: 10px; font-weight: 600; cursor: pointer; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 24px; height: 24px; }

  /* VIEWS */
  .view { display: none; } .view.active { display: block; }

  /* HISTORIAL */
  .hist-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .hist-head { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .hist-head h3 { font-size: 15px; font-weight: 700; }
  .hist-neto { color: var(--accent2); font-weight: 800; font-size: 15px; }
  .hist-body { border-top: 1px solid var(--border); padding: 4px 16px 14px; display: none; }
  .hist-body.open { display: block; }
  .hrow { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
  .hrow:last-child { border-bottom: none; }
  .hrow .hl { color: var(--accent2); font-weight: 800; }

  /* MODAL FECHA */
  .sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: none; align-items: flex-end; justify-content: center; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); }
  .sheet-bg.open { display: flex; }
  .sheet { background: var(--card); border-radius: 24px 24px 0 0; padding: 20px 20px calc(20px + var(--safe-bottom)); width: 100%; max-width: 430px; animation: slideUp 0.3s cubic-bezier(.32,.72,0,1); }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .sheet h3 { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
  .sheet p { font-size: 12px; color: var(--muted2); margin-bottom: 16px; }
  .date-input-big { width: 100%; background: var(--bg); border: 2px solid var(--accent); border-radius: 14px; color: var(--text); font-size: 20px; font-weight: 700; font-family: -apple-system,sans-serif; padding: 14px 16px; outline: none; -webkit-appearance: none; margin-bottom: 14px; }
  .btn-confirmar { width: 100%; background: var(--accent); color: white; border: none; border-radius: 14px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: -apple-system,sans-serif; }
  .btn-confirmar:active { opacity: 0.8; }

  /* MES SHEET */
  .year-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 16px; }
  .year-row button { background: var(--card2); border: none; color: var(--text); padding: 7px 18px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: -apple-system,sans-serif; }
  .year-row span { font-size: 20px; font-weight: 800; }
  .months-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .m-opt { background: var(--bg); border: 1.5px solid var(--border); border-radius: 14px; padding: 12px 8px; text-align: center; font-size: 14px; font-weight: 700; cursor: pointer; color: var(--text); font-family: -apple-system,sans-serif; }
  .m-opt.sel { background: var(--accent); border-color: var(--accent); color: white; }

  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty .ico { font-size: 48px; margin-bottom: 14px; }

  /* DIAS ADJUSTER */
  .dias-adjuster {
    margin: 16px 16px 0;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .dias-adjuster-info { flex: 1; }
  .dias-adjuster-info .title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 2px; }
  .dias-adjuster-info .val { font-size: 22px; font-weight: 800; color: var(--text); }
  .dias-adjuster-info .val span { font-size: 13px; font-weight: 500; color: var(--muted2); margin-left: 4px; }
  .dias-btns-row { display: flex; gap: 8px; }
  .dias-btn {
    width: 42px; height: 42px; border-radius: 12px; border: none; cursor: pointer;
    font-size: 22px; font-weight: 700; font-family: -apple-system,sans-serif;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .dias-btn.minus { background: rgba(244,63,94,0.12); color: var(--red); }
  .dias-btn.plus  { background: rgba(108,99,255,0.15); color: var(--accent); }
  .dias-btn:active { opacity: 0.6; transform: scale(0.93); }
</style>
</head>
<body>

<div class="status-bar-space"></div>

<div class="header">
  <div class="header-top">
    <h1>Mis <span>Horas</span></h1>
    <button class="icon-btn" onclick="mostrarVista('historial')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </button>
  </div>
  <div class="month-row">
    <button onclick="cambiarPeriodo(-1)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="month-label-btn" id="lbl-mes">Cargando...</button>
    <button onclick="cambiarPeriodo(1)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<!-- FECHA INICIO DEL PERÍODO -->
<div class="inicio-row">
  <div class="inicio-label">Período:</div>
  <button class="inicio-date-btn" id="btn-fecha-inicio" onclick="abrirSheetFecha()">Configurar fecha</button>
  <div class="inicio-info" id="info-periodo"></div>
</div>

<!-- CONFIG -->
<div class="config-bar">
  <div class="cfg-item">
    <label>€/Picada</label>
    <input type="number" id="cfg-picada" step="0.001" value="0.05" oninput="guardarConfig();renderAll()">
  </div>
  <div class="cfg-item">
    <label>Base (€)</label>
    <input type="number" id="cfg-base" step="10" value="1780" oninput="guardarConfig();renderAll()">
  </div>
  <div class="cfg-item">
    <label>€/Hora Extra</label>
    <input type="number" id="cfg-extra" step="0.5" value="10" oninput="guardarConfig();renderAll()">
  </div>
  <div class="cfg-item">
    <label>RDE %</label>
    <input type="number" id="cfg-rde" step="0.1" value="20.5" oninput="guardarConfig();renderAll()">
  </div>
  <div class="cfg-item">
    <label>Seg. Social %</label>
    <input type="number" id="cfg-segsocial" step="0.1" value="6.35" oninput="guardarConfig();renderAll()">
  </div>
  <div class="cfg-item">
    <label>Días período</label>
    <input type="number" id="cfg-dias-periodo" step="1" value="36" min="28" max="60" oninput="guardarConfig();renderAll()">
  </div>
</div>

<div class="scroll-content">
  <div id="view-registro" class="view active">
    <div class="resumen"><div class="resumen-grid" id="resumen-grid"></div></div>
    <div class="section">
      <div class="sec-title">Días del período <button class="btn-hoy" onclick="irAHoy()">+ Hoy</button></div>
      <div id="lista-dias"></div>
    </div>

    <!-- AJUSTAR DÍAS DEL PERÍODO -->
    <div class="dias-adjuster">
      <div class="dias-adjuster-info">
        <div class="title">Duración del período</div>
        <div class="val" id="lbl-dias-periodo">36 <span>días</span></div>
      </div>
      <div class="dias-btns-row">
        <button class="dias-btn minus" onclick="ajustarDias(-1)" title="Quitar un día">−</button>
        <button class="dias-btn plus"  onclick="ajustarDias(1)"  title="Añadir un día">+</button>
      </div>
    </div>
    <div style="height:16px"></div>

  </div>

  <div id="view-historial" class="view">
    <div class="section" style="padding-top:18px">
      <div class="sec-title">Historial <button class="btn-hoy" style="background:var(--card2);color:var(--text);border:1px solid var(--border)" onclick="mostrarVista('registro')">← Volver</button></div>
      <div id="lista-historial"></div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-registro" onclick="mostrarVista('registro')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Registro
  </button>
  <button class="nav-btn" id="nav-historial" onclick="mostrarVista('historial')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Historial
  </button>
</nav>

<!-- SHEET FECHA INICIO -->
<div class="sheet-bg" id="sheet-fecha" onclick="cerrarSheetFecha(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>¿Cuándo empieza este período?</h3>
    <p>Pon la fecha del primer día. Los 30 días siguientes se calculan solos.</p>
    <input type="date" id="input-fecha-inicio" class="date-input-big">
    <button class="btn-confirmar" onclick="confirmarFechaInicio()">Confirmar</button>
  </div>
</div>

<script>
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

// periodoActual = índice del período (0 = primer período configurado, 1 = siguiente, etc.)
let periodoActual = 0;
// fechaBase = fecha de inicio del período 0 (guardada en localStorage)
let fechaBase = null; // Date object

// ── Storage ──
function getKey(periodo) { return 'trabajo_periodo_' + periodo; }
function getDatos(periodo) { return JSON.parse(localStorage.getItem(getKey(periodo)) || '[]'); }
function setDatos(periodo, d) { localStorage.setItem(getKey(periodo), JSON.stringify(d)); }

function getConfig() {
  return {
    picada:      parseFloat(document.getElementById('cfg-picada').value)      || 0.05,
    base:        parseFloat(document.getElementById('cfg-base').value)        || 1780,
    extra:       parseFloat(document.getElementById('cfg-extra').value)       || 10,
    rde:         parseFloat(document.getElementById('cfg-rde').value)         || 20.5,
    segsocial:   parseFloat(document.getElementById('cfg-segsocial').value)   || 6.35,
    diasPeriodo: parseInt(document.getElementById('cfg-dias-periodo').value)  || 36
  };
}
function guardarConfig() {
  localStorage.setItem('trabajo_config', JSON.stringify(getConfig()));
}
function cargarConfig() {
  const c = JSON.parse(localStorage.getItem('trabajo_config') || 'null');
  if (!c) return;
  if (c.picada    !== undefined) document.getElementById('cfg-picada').value      = c.picada;
  if (c.base      !== undefined) document.getElementById('cfg-base').value        = c.base;
  if (c.extra     !== undefined) document.getElementById('cfg-extra').value       = c.extra;
  if (c.rde       !== undefined) document.getElementById('cfg-rde').value         = c.rde;
  if (c.segsocial !== undefined) document.getElementById('cfg-segsocial').value   = c.segsocial;
  if (c.diasPeriodo !== undefined) document.getElementById('cfg-dias-periodo').value = c.diasPeriodo;
}

// ── Fecha base ──
function cargarFechaBase() {
  const saved = localStorage.getItem('trabajo_fecha_base');
  if (saved) {
    fechaBase = new Date(saved + 'T00:00:00');
  } else {
    // Por defecto: hoy
    fechaBase = new Date();
    fechaBase.setHours(0,0,0,0);
  }
}
function guardarFechaBase() {
  localStorage.setItem('trabajo_fecha_base', fechaFmt(fechaBase));
}

// Devuelve la fecha de inicio del período N
function getFechaInicioPeriodo(n) {
  const c = getConfig();
  const dias = c.diasPeriodo;
  const d = new Date(fechaBase);
  d.setDate(d.getDate() + n * dias);
  return d;
}

// Devuelve array de fechas del período N
function getFechasPeriodo(n) {
  const c = getConfig();
  const inicio = getFechaInicioPeriodo(n);
  const fechas = [];
  for (let i = 0; i < c.diasPeriodo; i++) {
    const f = new Date(inicio);
    f.setDate(f.getDate() + i);
    fechas.push(f);
  }
  return fechas;
}

function fechaFmt(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fechaDisplay(d) {
  return d.getDate() + ' ' + MESES[d.getMonth()].slice(0,3) + ' ' + d.getFullYear();
}

// ── Cuál período corresponde a hoy ──
function periodoDeHoy() {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const c = getConfig();
  const diff = Math.floor((hoy - fechaBase) / (1000*60*60*24));
  return Math.floor(diff / c.diasPeriodo);
}

// ── Actualizar label del mes ──
function actualizarLabel() {
  const fechas = getFechasPeriodo(periodoActual);
  const ini = fechas[0];
  const fin = fechas[fechas.length-1];
  const label = ini.getDate() + ' ' + MESES[ini.getMonth()].slice(0,3) + ' — ' + fin.getDate() + ' ' + MESES[fin.getMonth()].slice(0,3) + ' ' + fin.getFullYear();
  document.getElementById('lbl-mes').textContent = label;

  // Botón fecha inicio
  const inicioBtn = document.getElementById('btn-fecha-inicio');
  inicioBtn.textContent = fechaDisplay(ini);

  // Info período
  document.getElementById('info-periodo').textContent = 'Período ' + (periodoActual >= 0 ? '+' : '') + periodoActual;
}

// ── Navegación ──
function cambiarPeriodo(d) { periodoActual += d; actualizarLabel(); renderAll(); }

function mostrarVista(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  if (v === 'historial') renderHistorial();
}

// ── Sheet fecha ──
function abrirSheetFecha() {
  const ini = getFechaInicioPeriodo(periodoActual);
  document.getElementById('input-fecha-inicio').value = fechaFmt(ini);
  document.getElementById('sheet-fecha').classList.add('open');
}
function cerrarSheetFecha(e) {
  if (e.target === document.getElementById('sheet-fecha')) document.getElementById('sheet-fecha').classList.remove('open');
}
function confirmarFechaInicio() {
  const val = document.getElementById('input-fecha-inicio').value;
  if (!val) return;
  const nuevaFecha = new Date(val + 'T00:00:00');
  // Recalcular fechaBase para que el período actual empiece en esa fecha
  const c = getConfig();
  const nuevaBase = new Date(nuevaFecha);
  nuevaBase.setDate(nuevaBase.getDate() - periodoActual * c.diasPeriodo);
  fechaBase = nuevaBase;
  guardarFechaBase();
  document.getElementById('sheet-fecha').classList.remove('open');
  actualizarLabel();
  renderAll();
}

// ── Calcular ──
function calcular(datos) {
  const c = getConfig();
  let totalPicadas = 0, totalHoras = 0;
  datos.forEach(d => { totalPicadas += parseFloat(d.picadas)||0; totalHoras += parseFloat(d.horas)||0; });
  const totalPicada  = totalPicadas * c.picada;
  const totalExtras  = totalHoras * c.extra;
  const totalTonto   = totalPicada + c.base + totalExtras;
  const rde          = totalTonto * (c.rde / 100);
  const segSocialEur = totalTonto * (c.segsocial / 100);
  const deducciones  = rde + segSocialEur;
  const neto         = totalTonto - deducciones;
  return { totalPicadas, totalHoras, totalPicada, totalExtras, totalTonto, rde, segSocialEur, deducciones, neto };
}
const fmt = n => '€' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, '.');

// ── Render ──
function renderAll() {
  actualizarLabel();
  const datos = getDatos(periodoActual);
  renderResumen(datos);
  renderDias(datos);
  const dias = getConfig().diasPeriodo;
  const lbl = document.getElementById('lbl-dias-periodo');
  if (lbl) lbl.innerHTML = dias + ' <span>días</span>';
  document.getElementById('cfg-dias-periodo').value = dias;
}

function renderResumen(datos) {
  const r = calcular(datos);
  const c = getConfig();
  document.getElementById('resumen-grid').innerHTML =
    '<div class="r-card"><div class="r-label">Picadas</div><div class="r-val c-orange">' + r.totalPicadas.toLocaleString('es') + '</div><div class="r-sub">' + fmt(r.totalPicada) + '</div></div>' +
    '<div class="r-card"><div class="r-label">Horas Extra</div><div class="r-val c-purple">' + r.totalHoras.toFixed(1) + ' h</div><div class="r-sub">' + fmt(r.totalExtras) + '</div></div>' +
    '<div class="r-card"><div class="r-label">Bruto (Total Tonto)</div><div class="r-val" style="font-size:18px">' + fmt(r.totalTonto) + '</div><div class="r-sub">Deducciones: <span class="c-red">' + fmt(r.deducciones) + '</span></div></div>' +
    '<div class="r-card"><div class="r-label">Días registrados</div><div class="r-val" style="font-size:26px">' + datos.filter(d=>d.picadas>0||d.horas>0).length + '</div><div class="r-sub">de ' + c.diasPeriodo + ' días</div></div>' +
    '<div class="r-card full"><div class="r-label">💰 Neto a Cobrar este período</div><div class="r-val c-green" style="font-size:32px;letter-spacing:-1px">' + fmt(r.neto) + '</div><div class="r-sub">RDE ' + c.rde + '%: ' + fmt(r.rde) + ' · Seg. Social ' + c.segsocial + '%: ' + fmt(r.segSocialEur) + '</div></div>';
}

function renderDias(datos) {
  const cont = document.getElementById('lista-dias');
  cont.innerHTML = '';
  const fechas = getFechasPeriodo(periodoActual);
  const hoy = new Date(); hoy.setHours(0,0,0,0);

  fechas.forEach((fecha, i) => {
    const idx      = i; // index dentro del período
    const diaSem   = DIAS[fecha.getDay()];
    const entrada  = datos.find(x => x.idx === idx) || null;
    const pic      = entrada ? (parseFloat(entrada.picadas) || 0) : 0;
    const hex      = entrada ? (parseFloat(entrada.horas)   || 0) : 0;
    const tieneAlgo = pic > 0 || hex > 0;
    const dotCls   = hex > 0 ? 'has-horas' : tieneAlgo ? 'has-data' : '';
    const esHoy    = fecha.getTime() === hoy.getTime();
    const fechaStr = fecha.getDate() + ' de ' + MESES[fecha.getMonth()] + ' ' + fecha.getFullYear();

    const card = document.createElement('div');
    card.className = 'day-card'; card.id = 'card-' + idx;

    const header = document.createElement('div');
    header.className = 'day-header';
    header.innerHTML =
      '<div class="day-dot ' + dotCls + '"></div>' +
      '<div class="day-info">' +
        '<div class="day-name">' + diaSem + (esHoy ? ' <span style="color:var(--accent);font-size:11px">· Hoy</span>' : '') + '</div>' +
        '<div class="day-date">' + fechaStr + '</div>' +
      '</div>' +
      '<div class="day-tags">' +
        (pic > 0 ? '<span class="tag or">' + pic.toLocaleString('es') + ' pic.</span>' : '') +
        (hex > 0 ? '<span class="tag pu">' + hex + 'h</span>' : '') +
      '</div>' +
      '<span class="chevron" id="chev-' + idx + '">▼</span>';
    header.addEventListener('click', function() { toggleDia(idx); });

    const form = document.createElement('div');
    form.className = 'day-form'; form.id = 'form-' + idx;

    const grid = document.createElement('div');
    grid.className = 'form-grid';

    // Hora entrada
    const ffHin = document.createElement('div'); ffHin.className = 'ff';
    ffHin.innerHTML = '<label>Hora entrada</label>';
    const inHin = document.createElement('input'); inHin.type = 'time'; inHin.id = 'hin-' + idx;
    inHin.value = entrada && entrada.horaEntrada ? entrada.horaEntrada : '';
    inHin.addEventListener('change', function() { calcularHorasAuto(idx); });
    ffHin.appendChild(inHin); grid.appendChild(ffHin);

    // Hora salida
    const ffHout = document.createElement('div'); ffHout.className = 'ff';
    ffHout.innerHTML = '<label>Hora salida</label>';
    const inHout = document.createElement('input'); inHout.type = 'time'; inHout.id = 'hout-' + idx;
    inHout.value = entrada && entrada.horaSalida ? entrada.horaSalida : '';
    inHout.addEventListener('change', function() { calcularHorasAuto(idx); });
    ffHout.appendChild(inHout); grid.appendChild(ffHout);

    // Picadas
    const ffPic = document.createElement('div'); ffPic.className = 'ff';
    ffPic.innerHTML = '<label>Picadas</label>';
    const inPic = document.createElement('input');
    inPic.type = 'number'; inPic.inputMode = 'numeric'; inPic.id = 'pic-' + idx;
    inPic.min = '0'; inPic.placeholder = '0'; inPic.value = pic > 0 ? pic : '';
    ffPic.appendChild(inPic); grid.appendChild(ffPic);

    // Horas extra
    const ffHex = document.createElement('div'); ffHex.className = 'ff';
    ffHex.innerHTML = '<label>Horas extra</label>';
    const inHex = document.createElement('input');
    inHex.type = 'number'; inHex.inputMode = 'decimal'; inHex.id = 'hex-' + idx;
    inHex.min = '0'; inHex.step = '0.5'; inHex.placeholder = '0'; inHex.value = hex > 0 ? hex : '';
    ffHex.appendChild(inHex); grid.appendChild(ffHex);

    form.appendChild(grid);

    const btnG = document.createElement('button');
    btnG.className = 'btn-guardar'; btnG.textContent = 'Guardar';
    btnG.addEventListener('click', function() { guardarDia(idx); });
    form.appendChild(btnG);

    if (tieneAlgo) {
      const btnB = document.createElement('button');
      btnB.className = 'btn-borrar'; btnB.textContent = 'Borrar este día';
      btnB.addEventListener('click', function() { borrarDia(idx); });
      form.appendChild(btnB);
    }

    card.appendChild(header); card.appendChild(form);
    cont.appendChild(card);
  });
}

function toggleDia(idx) {
  const form = document.getElementById('form-' + idx);
  const chev = document.getElementById('chev-' + idx);
  const open = form.classList.contains('open');
  document.querySelectorAll('.day-form.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.chevron.open').forEach(el => el.classList.remove('open'));
  if (!open) { form.classList.add('open'); if(chev) chev.classList.add('open'); }
}

function calcularHorasAuto(idx) {
  const hin  = document.getElementById('hin-' + idx).value;
  const hout = document.getElementById('hout-' + idx).value;
  if (!hin || !hout) return;
  const [h1,m1] = hin.split(':').map(Number);
  const [h2,m2] = hout.split(':').map(Number);
  let minutos = (h2*60+m2) - (h1*60+m1);
  if (minutos < 0) minutos += 24*60;
  const horas = Math.round((minutos/60)*100)/100;
  const inHex = document.getElementById('hex-' + idx);
  if (inHex) {
    inHex.value = horas;
    inHex.style.borderColor = 'var(--accent2)';
    setTimeout(() => { inHex.style.borderColor = ''; }, 1500);
  }
}

function parsearNumero(val) {
  return parseFloat(String(val).replace(',','.')) || 0;
}

function guardarDia(idx) {
  let datos = getDatos(periodoActual);
  const pic  = parsearNumero(document.getElementById('pic-' + idx).value);
  const hex  = parsearNumero(document.getElementById('hex-' + idx).value);
  const hin  = document.getElementById('hin-' + idx).value;
  const hout = document.getElementById('hout-' + idx).value;
  datos = datos.filter(x => x.idx !== idx);
  if (pic > 0 || hex > 0 || hin || hout) datos.push({ idx, picadas:pic, horas:hex, horaEntrada:hin, horaSalida:hout });
  setDatos(periodoActual, datos);
  toggleDia(idx);
  renderAll();
}

function borrarDia(idx) {
  if (!confirm('¿Borrar los datos de este día?')) return;
  setDatos(periodoActual, getDatos(periodoActual).filter(x => x.idx !== idx));
  renderAll();
}

function irAHoy() {
  const n = periodoDeHoy();
  if (n !== periodoActual) { periodoActual = n; }
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const fechas = getFechasPeriodo(periodoActual);
  const idx = fechas.findIndex(f => f.getTime() === hoy.getTime());
  actualizarLabel(); renderAll();
  if (idx >= 0) {
    setTimeout(() => {
      const card = document.getElementById('card-' + idx);
      if (card) { card.scrollIntoView({ behavior:'smooth', block:'center' }); setTimeout(() => toggleDia(idx), 350); }
    }, 100);
  }
}

function renderHistorial() {
  const cont = document.getElementById('lista-historial');
  const periodos = [];
  for (let key in localStorage) {
    if (key.startsWith('trabajo_periodo_')) {
      const n = parseInt(key.replace('trabajo_periodo_', ''));
      if (!isNaN(n)) periodos.push(n);
    }
  }
  periodos.sort((a,b) => b - a);

  if (!periodos.length) { cont.innerHTML = '<div class="empty"><div class="ico">📊</div><p>Sin datos aún</p></div>'; return; }

  const c = getConfig();
  let html = '';
  periodos.forEach(n => {
    const datos = getDatos(n);
    if (!datos.length) return;
    const r = calcular(datos);
    const fechas = getFechasPeriodo(n);
    const label = fechaDisplay(fechas[0]) + ' — ' + fechaDisplay(fechas[fechas.length-1]);
    html +=
      '<div class="hist-card">' +
        '<div class="hist-head" onclick="this.nextElementSibling.classList.toggle(\'open\')">' +
          '<h3 style="font-size:13px">' + label + '</h3>' +
          '<span class="hist-neto">' + fmt(r.neto) + '</span>' +
        '</div>' +
        '<div class="hist-body">' +
          '<div class="hrow"><span>Picadas</span><span>' + r.totalPicadas.toLocaleString('es') + ' → ' + fmt(r.totalPicada) + '</span></div>' +
          '<div class="hrow"><span>Horas extra</span><span>' + r.totalHoras.toFixed(1) + ' h → ' + fmt(r.totalExtras) + '</span></div>' +
          '<div class="hrow"><span>Sueldo base</span><span>' + fmt(c.base) + '</span></div>' +
          '<div class="hrow"><span>Bruto total</span><span>' + fmt(r.totalTonto) + '</span></div>' +
          '<div class="hrow"><span>RDE (' + c.rde + '%)</span><span class="c-red">-' + fmt(r.rde) + '</span></div>' +
          '<div class="hrow"><span>Seg. Social (' + c.segsocial + '%)</span><span class="c-red">-' + fmt(r.segSocialEur) + '</span></div>' +
          '<div class="hrow"><span>Neto a cobrar</span><span class="hl">' + fmt(r.neto) + '</span></div>' +
        '</div>' +
      '</div>';
  });
  cont.innerHTML = html || '<div class="empty"><div class="ico">📊</div><p>Sin datos aún</p></div>';
}

function ajustarDias(delta) {
  const input = document.getElementById('cfg-dias-periodo');
  let val = parseInt(input.value) || 36;
  val = Math.max(28, Math.min(60, val + delta));
  input.value = val;
  guardarConfig();
  renderAll();
}

// ── Init ──
cargarConfig();
cargarFechaBase();
periodoActual = periodoDeHoy();
actualizarLabel();
renderAll();
</script>
</body>
</html>
